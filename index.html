<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="品番照合">
  <meta name="theme-color" content="#0a0a0f">
  <title>Barcode-Checker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #12121c;
      --border:    #1e1e30;
      --accent:    #00d4ff;
      --accent2:   #0099cc;
      --ok:        #00ff88;
      --ok-dim:    #00cc6a;
      --ng:        #ff3b5c;
      --ng-dim:    #cc2244;
      --text:      #e8e8f0;
      --muted:     #5a5a78;
      --card-r:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow: hidden;
    }

    /* ─── Layout ─── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .step-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.05em;
    }

    /* ─── Main scrollable area ─── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── Result panel (hero) ─── */
    .result-panel {
      border-radius: var(--card-r);
      border: 2px solid var(--border);
      background: var(--surface);
      padding: 22px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
      flex-shrink: 0;
    }
    .result-panel.ok {
      background: rgba(0,255,136,0.08);
      border-color: var(--ok);
      box-shadow: 0 0 24px rgba(0,255,136,0.18);
    }
    .result-panel.ng {
      background: rgba(255,59,92,0.08);
      border-color: var(--ng);
      box-shadow: 0 0 24px rgba(255,59,92,0.18);
    }
    .result-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .result-value {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--muted);
      transition: color 0.25s;
    }
    .result-panel.ok .result-value  { color: var(--ok); }
    .result-panel.ng .result-value  { color: var(--ng); }

    .result-icon-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .result-panel.ok .result-icon-wrap { background: rgba(0,255,136,0.15); }
    .result-panel.ng .result-icon-wrap { background: rgba(255,59,92,0.15); }

    /* ─── Match detail ─── */
    .match-detail {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      line-height: 1.5;
      display: none;
    }
    .match-detail.ok { color: var(--ok); border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }
    .match-detail.ng {
      color: var(--ng);
      border-color: var(--ng);
      background: rgba(255,59,92,0.1);
      font-size: 16px;
      font-weight: 700;
      padding: 16px 16px;
      border-width: 2px;
      letter-spacing: 0.01em;
    }
    .ng-token {
      display: inline-block;
      background: var(--ng);
      color: #1a0508;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 17px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      margin: 6px 4px 0 0;
      letter-spacing: 0.03em;
    }

    /* ─── Input cards ─── */
    .input-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--card-r);
      padding: 16px;
      transition: border-color 0.2s;
      position: relative;
    }
    .input-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0,212,255,0.2);
    }
    .input-card.filled {
      border-color: rgba(0,212,255,0.4);
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
    }
    .card-label-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .card-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .input-card.active .card-label .dot  { background: var(--accent); }
    .input-card.filled .card-label .dot  { background: var(--ok); }

    .cam-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,212,255,0.12);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cam-btn:active { background: rgba(0,212,255,0.22); transform: scale(0.96); }
    .cam-btn:disabled { opacity: 0.3; pointer-events: none; }
    .cam-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .scan-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 18px;
      font-family: 'Consolas', 'Courier New', 'Menlo', monospace;
      font-weight: 600;
      letter-spacing: 0.05em;
      caret-color: var(--accent);
    }
    .scan-input::placeholder {
      color: var(--muted);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0;
    }
    .scan-input:disabled {
      opacity: 0.4;
    }

    .scan-hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .scan-hint .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── Footer controls ─── */
    .footer {
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .reset-btn {
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: 1.5px solid #2a2a40;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active {
      background: #2a2a40;
      transform: scale(0.98);
    }
    .reset-btn.urgent {
      background: rgba(255,59,92,0.15);
      border-color: var(--ng);
      color: var(--ng);
      animation: urgent-pulse 1.4s ease-in-out infinite;
    }
    @keyframes urgent-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,92,0.35); }
      50%      { box-shadow: 0 0 0 6px rgba(255,59,92,0); }
    }

    /* ─── Feedback flash overlay ─── */
    .flash {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0;
      z-index: 100;
      transition: opacity 0.05s;
    }
    .flash.ok  { background: rgba(0,255,136,0.22); }
    .flash.ng  { background: rgba(255,59,92,0.28); }
    .flash.show { opacity: 1; }

    /* ─── Camera scan modal ─── */
    .cam-modal {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
    }
    .cam-modal.open { display: flex; }
    .cam-video-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }
    .cam-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cam-frame {
      position: absolute;
      top: 50%; left: 50%;
      width: 72%; max-width: 320px;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 3px solid var(--accent);
      border-radius: 18px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
    }
    .cam-frame::before, .cam-frame::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: cam-scan 1.8s ease-in-out infinite;
    }
    @keyframes cam-scan {
      0%, 100% { top: 6%; }
      50%      { top: 92%; }
    }
    .cam-topbar {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      z-index: 1;
    }
    .cam-topbar .cam-label {
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      background: rgba(0,0,0,0.5);
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }
    .cam-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cam-status {
      position: absolute;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 0 24px;
    }
    .cam-error {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px;
      text-align: center;
    }
    .cam-error p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .cam-error-icon { font-size: 40px; }
    .cam-retry-btn {
      background: var(--accent);
      color: #04303d;
      border: none;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ─── Vibration hint (status bar) ─── */
    .status-bar {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding-bottom: 6px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <div class="header-icon">📋</div>
      <h1>Barcode-Checker</h1>
    </div>
    <div class="step-badge" id="stepBadge">STEP 1 / 2</div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Result hero -->
    <div class="result-panel" id="resultPanel">
      <div>
        <div class="result-label">照合結果</div>
        <div class="result-value" id="resultValue">待機中</div>
      </div>
      <div class="result-icon-wrap" id="resultIcon">⏳</div>
    </div>

    <!-- Match detail -->
    <div class="match-detail" id="matchDetail"></div>

    <!-- Input A -->
    <div class="input-card active" id="cardA">
      <div class="card-label">
        <div class="card-label-left">
          <span class="dot"></span>
          データ A ― 基準バーコード
        </div>
        <button class="cam-btn" id="camBtnA" onclick="openCamera('A')" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          カメラ
        </button>
      </div>
      <input class="scan-input" id="dataA" type="text"
             placeholder="スキャンしてください" autocomplete="off"
             autocorrect="off" spellcheck="false" inputmode="none">
      <div class="scan-hint"><span class="pulse"></span>スキャン待機中</div>
    </div>

    <!-- Input B -->
    <div class="input-card" id="cardB">
      <div class="card-label">
        <div class="card-label-left">
          <span class="dot"></span>
          データ B ― 照合バーコード
        </div>
        <button class="cam-btn" id="camBtnB" onclick="openCamera('B')" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          カメラ
        </button>
      </div>
      <input class="scan-input" id="dataB" type="text"
             placeholder="データAのスキャン後に有効になります" autocomplete="off"
             autocorrect="off" spellcheck="false" inputmode="none" disabled>
      <div class="scan-hint" id="hintB" style="display:none"><span class="pulse"></span>スキャン待機中</div>
    </div>

    <div class="status-bar" id="statusBar">Bluetoothスキャナー接続、またはカメラボタンでスキャン</div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <button class="reset-btn" id="resetBtn" onclick="clearAll()">↺ &nbsp;リセット</button>
  </footer>
</div>

<!-- Camera scan modal -->
<div class="cam-modal" id="camModal">
  <div class="cam-video-wrap">
    <video id="camVideo" playsinline muted autoplay></video>
    <div class="cam-topbar">
      <span class="cam-label" id="camLabel">データ A をスキャン</span>
      <button class="cam-close" onclick="closeCamera()" aria-label="閉じる">✕</button>
    </div>
    <div class="cam-frame" id="camFrame"></div>
    <div class="cam-status" id="camStatus">QRコード・バーコードを枠内に収めてください</div>
  </div>
  <div class="cam-error" id="camError" style="display:none">
    <div class="cam-error-icon">📷</div>
    <p id="camErrorMsg">カメラを起動できませんでした。<br>ブラウザの設定でカメラへのアクセスを許可してください。</p>
    <button class="cam-retry-btn" onclick="retryCamera()">再試行</button>
  </div>
</div>

<script>
  // ─── Elements ───
  const elA        = document.getElementById('dataA');
  const elB        = document.getElementById('dataB');
  const cardA      = document.getElementById('cardA');
  const cardB      = document.getElementById('cardB');
  const resultPanel= document.getElementById('resultPanel');
  const resultValue= document.getElementById('resultValue');
  const resultIcon = document.getElementById('resultIcon');
  const matchDetail= document.getElementById('matchDetail');
  const flash      = document.getElementById('flash');
  const stepBadge  = document.getElementById('stepBadge');
  const statusBar  = document.getElementById('statusBar');
  const hintB      = document.getElementById('hintB');
  const resetBtn   = document.getElementById('resetBtn');
  const camBtnA    = document.getElementById('camBtnA');
  const camBtnB    = document.getElementById('camBtnB');
  const camModal   = document.getElementById('camModal');
  const camVideo   = document.getElementById('camVideo');
  const camLabel   = document.getElementById('camLabel');
  const camStatus  = document.getElementById('camStatus');
  const camError   = document.getElementById('camError');
  const camErrorMsg= document.getElementById('camErrorMsg');
  const camFrame   = document.getElementById('camFrame');

  // ─── State ───
  let step = 1;          // 1=waitA, 2=waitB, 3=done
  let valueA = '';
  let scanBuffer = '';
  let bufTimer = null;
  let autoTimer = null;
  const BUF_MS  = 800;
  const AUTO_MS = 500;

  // ─── Audio ───
  let ctx = null;
  function ensureAudio() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur, type='sine', vol=0.5) {
    if (!ctx) return;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = type;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }
  function soundOK() { tone(523,0.12,'sine',0.5); setTimeout(()=>tone(659,0.15,'sine',0.5),130); }
  function soundNG() {
    tone(160,0.28,'sawtooth',0.8);
    setTimeout(()=>tone(140,0.28,'sawtooth',0.8),320);
    setTimeout(()=>tone(120,0.28,'sawtooth',0.8),640);
  }

  // ─── Vibration ───
  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // ─── Flash ───
  function doFlash(type) {
    flash.className = `flash ${type} show`;
    setTimeout(() => flash.classList.remove('show'), 120);
  }

  // ─── Delimiter split ───
  function split(s) {
    return s.split(/[\s,\t\n;|]+/).filter(t => t.length > 0);
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  // ─── Scan buffer (handles BT scanner rapid keypress → Enter) ───
  document.addEventListener('keypress', function(e) {
    if (step === 3) return;
    ensureAudio();

    if (e.key !== 'Enter') {
      scanBuffer += e.key;
      clearTimeout(bufTimer);
      bufTimer = setTimeout(() => { scanBuffer = ''; }, BUF_MS);
      return;
    }

    // Enter received
    const val = scanBuffer.trim();
    scanBuffer = '';
    clearTimeout(bufTimer);
    if (!val) return;

    e.preventDefault();

    if (step === 1) {
      elA.value = val;
      handleA(val);
    } else if (step === 2) {
      elB.value = val;
      handleB(val);
    }
  });

  // Fallback: manual Enter in input fields
  elA.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = elA.value.trim();
      if (v && step === 1) { e.preventDefault(); handleA(v); }
    }
  });
  elB.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = elB.value.trim();
      if (v && step === 2) { e.preventDefault(); handleB(v); }
    }
  });

  // Auto-compare on input (fallback for scanners that don't send Enter)
  elB.addEventListener('input', function() {
    if (step !== 2 || !valueA) return;
    clearTimeout(autoTimer);
    autoTimer = setTimeout(() => {
      const v = elB.value.trim();
      if (v) handleB(v);
    }, AUTO_MS);
  });

  // ─── Step handlers ───
  function handleA(val) {
    if (step !== 1) return;
    valueA = val;
    step = 2;

    cardA.classList.remove('active');
    cardA.classList.add('filled');
    cardB.classList.add('active');
    elB.disabled = false;
    camBtnB.disabled = false;
    hintB.style.display = 'flex';
    elB.focus();

    stepBadge.textContent = 'STEP 2 / 2';
    setResult('pending', '待機中', '⏳');
    statusBar.textContent = 'データBをスキャンしてください';
    vibrate(30);
  }

  function handleB(val) {
    if (step !== 2 || !valueA) return;
    step = 3;
    ensureAudio();

    cardB.classList.remove('active');
    cardB.classList.add('filled');
    stepBadge.textContent = 'DONE';

    const tokA = split(valueA);
    const tokB = split(val);
    const unmatched = tokA.filter(t => !tokB.includes(t));
    const matched   = tokA.filter(t =>  tokB.includes(t));
    const isOK = unmatched.length === 0 && tokA.length > 0;

    if (isOK) {
      setResult('ok', 'OK', '✓');
      matchDetail.className = 'match-detail ok';
      matchDetail.textContent = '✓ 一致：' + matched.join(' / ');
      soundOK();
      doFlash('ok');
      vibrate([60, 40, 60]);
      statusBar.textContent = '一致しました';
    } else {
      setResult('ng', 'NG', '✗');
      matchDetail.className = 'match-detail ng';
      if (unmatched.length) {
        matchDetail.innerHTML = '✗ 不一致の品番<br>' +
          unmatched.map(t => `<span class="ng-token">${escapeHtml(t)}</span>`).join(' ');
      } else {
        matchDetail.textContent = '⚠ データAが空です';
      }
      soundNG();
      doFlash('ng');
      vibrate([80, 50, 80, 50, 80]);
      statusBar.textContent = '不一致です。ご確認のうえリセットしてください';
    }
    matchDetail.style.display = 'block';

    if (isOK) {
      setTimeout(autoReset, 3000);
    } else {
      resetBtn.classList.add('urgent');
    }
  }

  function setResult(type, text, icon) {
    resultPanel.className = `result-panel ${type}`;
    resultValue.textContent = text;
    resultIcon.textContent  = icon;
  }

  // ─── Reset ───
  function autoReset() {
    step = 1; valueA = ''; scanBuffer = '';
    clearTimeout(bufTimer); clearTimeout(autoTimer);

    elA.value = ''; elB.value = '';
    elB.disabled = true;
    camBtnB.disabled = true;

    cardA.className = 'input-card active';
    cardB.className = 'input-card';
    hintB.style.display = 'none';

    matchDetail.style.display = 'none';
    matchDetail.className = 'match-detail';
    setResult('', '待機中', '⏳');
    resetBtn.classList.remove('urgent');

    stepBadge.textContent = 'STEP 1 / 2';
    statusBar.textContent = 'データAをスキャンしてください';
    elA.focus();
  }

  function clearAll() {
    ensureAudio();
    vibrate(20);
    clearTimeout(autoTimer);
    autoReset();
  }

  // ─── Camera scanning ───
  let camStream = null;
  let camTarget = null;     // 'A' or 'B'
  let camRafId = null;
  let camCanvas = null;
  let camCtx = null;
  let nativeDetector = null;
  let camStopScan = null;

  if ('BarcodeDetector' in window) {
    try {
      nativeDetector = new BarcodeDetector({
        formats: ['qr_code', 'code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf', 'codabar']
      });
    } catch (e) { nativeDetector = null; }
  }

  async function openCamera(target) {
    if ((target === 'A' && step !== 1) || (target === 'B' && step !== 2)) return;
    camTarget = target;
    camLabel.textContent = target === 'A' ? 'データ A をスキャン' : 'データ B をスキャン';
    camError.style.display = 'none';
    camFrame.style.display = '';
    camStatus.style.display = '';
    camModal.classList.add('open');
    ensureAudio();

    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      camVideo.srcObject = camStream;
      await camVideo.play();
      startScanLoop();
    } catch (err) {
      showCamError(err);
    }
  }

  function showCamError(err) {
    camFrame.style.display = 'none';
    camStatus.style.display = 'none';
    camError.style.display = 'flex';
    if (err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')) {
      camErrorMsg.innerHTML = 'カメラへのアクセスが許可されていません。<br>ブラウザの設定でこのサイトのカメラ権限を許可してください。';
    } else if (err && err.name === 'NotFoundError') {
      camErrorMsg.innerHTML = 'カメラが見つかりませんでした。<br>端末にカメラが接続されているかご確認ください。';
    } else {
      camErrorMsg.innerHTML = 'カメラを起動できませんでした。<br>ページを再読み込みして再度お試しください。';
    }
  }

  function retryCamera() {
    if (camTarget) openCamera(camTarget);
  }

  function closeCamera() {
    camModal.classList.remove('open');
    if (camStopScan) { camStopScan(); camStopScan = null; }
    if (camRafId) { cancelAnimationFrame(camRafId); camRafId = null; }
    if (camStream) {
      camStream.getTracks().forEach(t => t.stop());
      camStream = null;
    }
    camVideo.srcObject = null;
    camTarget = null;
  }

  function startScanLoop() {
    if (!camCanvas) {
      camCanvas = document.createElement('canvas');
      camCtx = camCanvas.getContext('2d', { willReadFrequently: true });
    }

    let busy = false;
    let stopped = false;
    camStopScan = () => { stopped = true; };

    const scanFrame = async () => {
      if (stopped) return;
      if (busy || !camStream || camVideo.readyState < 2) {
        camRafId = requestAnimationFrame(scanFrame);
        return;
      }
      busy = true;

      let value = null;

      if (nativeDetector) {
        try {
          const codes = await nativeDetector.detect(camVideo);
          if (codes && codes.length) {
            value = codes[0].rawValue;
            console.log('[cam] BarcodeDetector hit:', value);
          }
        } catch (e) {
          console.warn('[cam] BarcodeDetector error:', e);
        }
      } else if (window.jsQR) {
        const w = camVideo.videoWidth, h = camVideo.videoHeight;
        if (w && h) {
          camCanvas.width = w;
          camCanvas.height = h;
          camCtx.drawImage(camVideo, 0, 0, w, h);
          const imgData = camCtx.getImageData(0, 0, w, h);
          const result = jsQR(imgData.data, w, h);
          if (result && result.data) {
            value = result.data;
            console.log('[cam] jsQR hit:', value);
          }
        }
      }

      busy = false;

      if (stopped) return;

      if (value) {
        onCameraResult(value.trim());
        return; // stop loop; onCameraResult closes modal
      }

      camRafId = requestAnimationFrame(scanFrame);
    };

    camRafId = requestAnimationFrame(scanFrame);
  }

  function onCameraResult(value) {
    console.log('[cam] onCameraResult called. value=', value, 'camTarget=', camTarget, 'step=', step);
    if (!value) { camRafId = requestAnimationFrame(() => startScanLoop()); return; }
    const target = camTarget;
    vibrate(40);
    closeCamera();

    // closeCamera() clears camTarget; we already captured it above.
    setTimeout(() => {
      console.log('[cam] applying result. target=', target, 'step=', step);
      if (target === 'A') {
        elA.value = value;
        handleA(value);
      } else if (target === 'B') {
        elB.value = value;
        handleB(value);
      }
    }, 0);
  }

  camModal.addEventListener('click', e => {
    if (e.target === camModal) closeCamera();
  });

  // ─── Native Android wrapper bridge ───
  // KEYENCE DX-A800等、物理トリガーで読み取った値はネイティブの
  // ラッパーアプリ（WebView）経由でこの関数に渡される。
  window.onNativeScan = function(value) {
    if (!value) return;
    const v = String(value).trim();
    if (!v) return;
    console.log('[native] onNativeScan called. value=', v, 'step=', step);
    vibrate(40);
    if (step === 1) {
      elA.value = v;
      handleA(v);
    } else if (step === 2) {
      elB.value = v;
      handleB(v);
    }
  };


  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(() => {
        statusBar.textContent = 'データAをスキャンしてください';
      }).catch(() => {});
    });
  }

  // Ensure audio on first touch
  document.addEventListener('touchstart', ensureAudio, { once: true });
  document.addEventListener('click',      ensureAudio, { once: true });

  // Focus A on load
  window.addEventListener('load', () => { elA.focus(); });
</script>
</body>
</html>
