<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="品番照合">
  <meta name="theme-color" content="#0a0a0f">
  <title>Barcode-Checker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #12121c;
      --border:    #1e1e30;
      --accent:    #00d4ff;
      --accent2:   #0099cc;
      --ok:        #00ff88;
      --ok-dim:    #00cc6a;
      --ng:        #ff3b5c;
      --ng-dim:    #cc2244;
      --text:      #e8e8f0;
      --muted:     #5a5a78;
      --card-r:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow: hidden;
    }

    /* ─── Layout ─── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh; /* fallback */
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .step-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.05em;
    }

    /* ─── Main scrollable area ─── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── Result panel (hero) ─── */
    .result-panel {
      border-radius: var(--card-r);
      border: 2px solid var(--border);
      background: var(--surface);
      padding: 22px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
      flex-shrink: 0;
    }
    .result-panel.ok {
      background: rgba(0,255,136,0.08);
      border-color: var(--ok);
      box-shadow: 0 0 24px rgba(0,255,136,0.18);
    }
    .result-panel.ng {
      background: rgba(255,59,92,0.08);
      border-color: var(--ng);
      box-shadow: 0 0 24px rgba(255,59,92,0.18);
    }
    .result-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .result-value {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--muted);
      transition: color 0.25s;
    }
    .result-panel.ok .result-value  { color: var(--ok); }
    .result-panel.ng .result-value  { color: var(--ng); }

    .result-icon-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .result-panel.ok .result-icon-wrap { background: rgba(0,255,136,0.15); }
    .result-panel.ng .result-icon-wrap { background: rgba(255,59,92,0.15); }

    /* ─── Match detail ─── */
    .match-detail {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      line-height: 1.5;
      display: none;
    }
    .match-detail.ok { color: var(--ok); border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }
    .match-detail.ng {
      color: var(--ng);
      border-color: var(--ng);
      background: rgba(255,59,92,0.1);
      font-size: 16px;
      font-weight: 700;
      padding: 16px 16px;
      border-width: 2px;
      letter-spacing: 0.01em;
    }
    .ng-token {
      display: inline-block;
      background: var(--ng);
      color: #1a0508;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 17px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      margin: 6px 4px 0 0;
      letter-spacing: 0.03em;
    }

    /* ─── Input cards ─── */
    .input-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--card-r);
      padding: 16px;
      transition: border-color 0.2s;
      position: relative;
    }
    .input-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0,212,255,0.2);
    }
    .input-card.filled {
      border-color: rgba(0,212,255,0.4);
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .card-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .input-card.active .card-label .dot  { background: var(--accent); }
    .input-card.filled .card-label .dot  { background: var(--ok); }

    .scan-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 18px;
      font-family: 'Consolas', 'Courier New', 'Menlo', monospace;
      font-weight: 600;
      letter-spacing: 0.05em;
      caret-color: var(--accent);
    }
    .scan-input::placeholder {
      color: var(--muted);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0;
    }
    .scan-input:disabled {
      opacity: 0.4;
    }

    .scan-hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .scan-hint .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ─── Footer controls ─── */
    .footer {
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .reset-btn {
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: 1.5px solid #2a2a40;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active {
      background: #2a2a40;
      transform: scale(0.98);
    }
    .reset-btn.urgent {
      background: rgba(255,59,92,0.15);
      border-color: var(--ng);
      color: var(--ng);
      animation: urgent-pulse 1.4s ease-in-out infinite;
    }
    @keyframes urgent-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,92,0.35); }
      50%      { box-shadow: 0 0 0 6px rgba(255,59,92,0); }
    }

    /* ─── Feedback flash overlay ─── */
    .flash {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0;
      z-index: 100;
      transition: opacity 0.05s;
    }
    .flash.ok  { background: rgba(0,255,136,0.22); }
    .flash.ng  { background: rgba(255,59,92,0.28); }
    .flash.show { opacity: 1; }

    /* ─── Vibration hint (status bar) ─── */
    .status-bar {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding-bottom: 6px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <div class="header-icon">📋</div>
      <h1>Barcode-Checker</h1>
    </div>
    <div class="step-badge" id="stepBadge">STEP 1 / 2</div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Result hero -->
    <div class="result-panel" id="resultPanel">
      <div>
        <div class="result-label">照合結果</div>
        <div class="result-value" id="resultValue">待機中</div>
      </div>
      <div class="result-icon-wrap" id="resultIcon">⏳</div>
    </div>

    <!-- Match detail -->
    <div class="match-detail" id="matchDetail"></div>

    <!-- Input A -->
    <div class="input-card active" id="cardA">
      <div class="card-label">
        <span class="dot"></span>
        データ A ― 基準バーコード
      </div>
      <input class="scan-input" id="dataA" type="text"
             placeholder="スキャンしてください" autocomplete="off"
             autocorrect="off" spellcheck="false" inputmode="none">
      <div class="scan-hint"><span class="pulse"></span>スキャン待機中</div>
    </div>

    <!-- Input B -->
    <div class="input-card" id="cardB">
      <div class="card-label">
        <span class="dot"></span>
        データ B ― 照合バーコード
      </div>
      <input class="scan-input" id="dataB" type="text"
             placeholder="データAのスキャン後に有効になります" autocomplete="off"
             autocorrect="off" spellcheck="false" inputmode="none" disabled>
      <div class="scan-hint" id="hintB" style="display:none"><span class="pulse"></span>スキャン待機中</div>
    </div>

    <div class="status-bar" id="statusBar">Bluetoothスキャナー接続をご確認ください</div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <button class="reset-btn" id="resetBtn" onclick="clearAll()">↺ &nbsp;リセット</button>
  </footer>
</div>

<script>
  // ─── Elements ───
  const elA        = document.getElementById('dataA');
  const elB        = document.getElementById('dataB');
  const cardA      = document.getElementById('cardA');
  const cardB      = document.getElementById('cardB');
  const resultPanel= document.getElementById('resultPanel');
  const resultValue= document.getElementById('resultValue');
  const resultIcon = document.getElementById('resultIcon');
  const matchDetail= document.getElementById('matchDetail');
  const flash      = document.getElementById('flash');
  const stepBadge  = document.getElementById('stepBadge');
  const statusBar  = document.getElementById('statusBar');
  const hintB      = document.getElementById('hintB');
  const resetBtn   = document.getElementById('resetBtn');

  // ─── State ───
  let step = 1;          // 1=waitA, 2=waitB, 3=done
  let valueA = '';
  let scanBuffer = '';
  let bufTimer = null;
  let autoTimer = null;
  const BUF_MS  = 800;
  const AUTO_MS = 500;

  // ─── Audio ───
  let ctx = null;
  function ensureAudio() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur, type='sine', vol=0.5) {
    if (!ctx) return;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = type;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }
  function soundOK() { tone(523,0.12,'sine',0.5); setTimeout(()=>tone(659,0.15,'sine',0.5),130); }
  function soundNG() {
    tone(160,0.28,'sawtooth',0.8);
    setTimeout(()=>tone(140,0.28,'sawtooth',0.8),320);
    setTimeout(()=>tone(120,0.28,'sawtooth',0.8),640);
  }

  // ─── Vibration ───
  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // ─── Flash ───
  function doFlash(type) {
    flash.className = `flash ${type} show`;
    setTimeout(() => flash.classList.remove('show'), 120);
  }

  // ─── Delimiter split ───
  function split(s) {
    return s.split(/[\s,\t\n;|]+/).filter(t => t.length > 0);
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  // ─── Scan buffer (handles BT scanner rapid keypress → Enter) ───
  document.addEventListener('keypress', function(e) {
    if (step === 3) return;
    ensureAudio();

    if (e.key !== 'Enter') {
      scanBuffer += e.key;
      clearTimeout(bufTimer);
      bufTimer = setTimeout(() => { scanBuffer = ''; }, BUF_MS);
      return;
    }

    // Enter received
    const val = scanBuffer.trim();
    scanBuffer = '';
    clearTimeout(bufTimer);
    if (!val) return;

    e.preventDefault();

    if (step === 1) {
      elA.value = val;
      handleA(val);
    } else if (step === 2) {
      elB.value = val;
      handleB(val);
    }
  });

  // Fallback: manual Enter in input fields
  elA.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = elA.value.trim();
      if (v && step === 1) { e.preventDefault(); handleA(v); }
    }
  });
  elB.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = elB.value.trim();
      if (v && step === 2) { e.preventDefault(); handleB(v); }
    }
  });

  // Auto-compare on input (fallback for scanners that don't send Enter)
  elB.addEventListener('input', function() {
    if (step !== 2 || !valueA) return;
    clearTimeout(autoTimer);
    autoTimer = setTimeout(() => {
      const v = elB.value.trim();
      if (v) handleB(v);
    }, AUTO_MS);
  });

  // ─── Step handlers ───
  function handleA(val) {
    if (step !== 1) return;
    valueA = val;
    step = 2;

    cardA.classList.remove('active');
    cardA.classList.add('filled');
    cardB.classList.add('active');
    elB.disabled = false;
    hintB.style.display = 'flex';
    elB.focus();

    stepBadge.textContent = 'STEP 2 / 2';
    setResult('pending', '待機中', '⏳');
    statusBar.textContent = 'データBをスキャンしてください';
    vibrate(30);
  }

  function handleB(val) {
    if (step !== 2 || !valueA) return;
    step = 3;
    ensureAudio();

    cardB.classList.remove('active');
    cardB.classList.add('filled');
    stepBadge.textContent = 'DONE';

    const tokA = split(valueA);
    const tokB = split(val);
    const unmatched = tokA.filter(t => !tokB.includes(t));
    const matched   = tokA.filter(t =>  tokB.includes(t));
    const isOK = unmatched.length === 0 && tokA.length > 0;

    if (isOK) {
      setResult('ok', 'OK', '✓');
      matchDetail.className = 'match-detail ok';
      matchDetail.textContent = '✓ 一致：' + matched.join(' / ');
      soundOK();
      doFlash('ok');
      vibrate([60, 40, 60]);
      statusBar.textContent = '一致しました';
    } else {
      setResult('ng', 'NG', '✗');
      matchDetail.className = 'match-detail ng';
      if (unmatched.length) {
        matchDetail.innerHTML = '✗ 不一致の品番<br>' +
          unmatched.map(t => `<span class="ng-token">${escapeHtml(t)}</span>`).join(' ');
      } else {
        matchDetail.textContent = '⚠ データAが空です';
      }
      soundNG();
      doFlash('ng');
      vibrate([80, 50, 80, 50, 80]);
      statusBar.textContent = '不一致です。ご確認のうえリセットしてください';
    }
    matchDetail.style.display = 'block';

    if (isOK) {
      setTimeout(autoReset, 3000);
    } else {
      resetBtn.classList.add('urgent');
    }
  }

  function setResult(type, text, icon) {
    resultPanel.className = `result-panel ${type}`;
    resultValue.textContent = text;
    resultIcon.textContent  = icon;
  }

  // ─── Reset ───
  function autoReset() {
    step = 1; valueA = ''; scanBuffer = '';
    clearTimeout(bufTimer); clearTimeout(autoTimer);

    elA.value = ''; elB.value = '';
    elB.disabled = true;

    cardA.className = 'input-card active';
    cardB.className = 'input-card';
    hintB.style.display = 'none';

    matchDetail.style.display = 'none';
    matchDetail.className = 'match-detail';
    setResult('', '待機中', '⏳');
    resetBtn.classList.remove('urgent');

    stepBadge.textContent = 'STEP 1 / 2';
    statusBar.textContent = 'データAをスキャンしてください';
    elA.focus();
  }

  function clearAll() {
    ensureAudio();
    vibrate(20);
    clearTimeout(autoTimer);
    autoReset();
  }

  // ─── SW registration ───
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(() => {
        statusBar.textContent = 'データAをスキャンしてください';
      }).catch(() => {});
    });
  }

  // Ensure audio on first touch
  document.addEventListener('touchstart', ensureAudio, { once: true });
  document.addEventListener('click',      ensureAudio, { once: true });

  // Focus A on load
  window.addEventListener('load', () => { elA.focus(); });
</script>
</body>
</html>
